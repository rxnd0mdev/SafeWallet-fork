apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-nest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway-nest
  template:
    metadata:
      labels:
        app: gateway-nest
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: gateway-nest
        image: safewallet/gateway-nest:v3
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        envFrom:
        - secretRef:
            name: gateway-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-role
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-rb
subjects:
- kind: ServiceAccount
  name: gateway-sa
roleRef:
  kind: Role
  name: gateway-role
  apiGroup: rbac.authorization.k8s.io
